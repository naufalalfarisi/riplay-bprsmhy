<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" fill="none">
  <!-- Geometric ribbon icon -->
  <g transform="translate(280, 0)">
    <!-- Bottom-left green parallelogram -->
    <polygon points="20,80 60,50 100,80 60,110" fill="#2e8b57" opacity="0.85"/>
    <!-- Top-right lighter green parallelogram -->
    <polygon points="50,50 90,20 130,50 90,80" fill="#3ca52f" opacity="0.75"/>
    <!-- Middle dark teal parallelogram -->
    <polygon points="35,65 75,35 115,65 75,95" fill="#196a5c"/>
    <!-- Top accent light -->
    <polygon points="70,30 100,10 130,30 100,50" fill="#7bc67e" opacity="0.6"/>
  </g>
  <!-- Text: bank syariah -->
  <text x="10" y="75" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#196a5c" letter-spacing="-0.5">bank syariah</text>
  <!-- Text: mitra harmoni -->
  <text x="10" y="115" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#196a5c" letter-spacing="-0.5" font-style="italic">mitra harmoni</text>
  <!-- Text: bprs mitra harmoni yogyakarta -->
  <text x="10" y="138" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#7a8a7e" letter-spacing="0.5">bprs mitra harmoni yogyakarta</text>
</svg>
